<div class="layout">
  <aside class="sidebar" aria-label="Sidebar tabs">
    <h1>{{ title }}</h1>
    <button
      type="button"
      class="tab"
      [class.active]="selectedTab === 'results'"
      (click)="setTab('results')"
    >
      Results Tracker
    </button>
    <button
      type="button"
      class="tab"
      [class.active]="selectedTab === 'about'"
      (click)="setTab('about')"
    >
      About
    </button>
  </aside>

  <main class="content">
    <section *ngIf="selectedTab === 'results'" class="panel">
      <h2>Results Tracker</h2>

      <form class="entry-form" (ngSubmit)="addEntry()">
        <label>
          Game played
          <input
            type="text"
            name="game"
            [(ngModel)]="game"
            placeholder="e.g. Chess"
            required
          />
        </label>

        <label>
          Winner
          <select
            name="winner"
            [(ngModel)]="winner"
            required
          >
            <option value="" disabled>Select winner</option>
            <option *ngFor="let option of winners" [value]="option">{{ option }}</option>
          </select>
        </label>

        <button type="submit" [disabled]="winners.length === 0">Add result</button>
      </form>

      <p class="empty-state" *ngIf="winners.length === 0">
        No winners available. Add names to src/assets/winners.json.
      </p>

      <table class="results" *ngIf="entries.length > 0; else noEntries">
        <thead>
          <tr>
            <th>Game</th>
            <th>Winner</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let entry of entries">
            <td>{{ entry.game }}</td>
            <td>{{ entry.winner }}</td>
          </tr>
        </tbody>
      </table>

      <ng-template #noEntries>
        <p class="empty-state">No game results yet. Add your first result above.</p>
      </ng-template>
    </section>

    <section *ngIf="selectedTab === 'about'" class="panel">
      <h2>About</h2>
      <p class="empty-state">Use the Results Tracker tab to add and view game winners.</p>
    </section>
  </main>
</div>
